<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>โรงเรียนบ้านใหม่ — ระบบบริหารงานนักเรียน</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
  <span class="logo">🏫</span>
  <div>
    <div class="title" id="school-name">โรงเรียนบ้านใหม่</div>
    <div style="font-size:13px;opacity:.9" id="school-meta">ระบบบริหารงานนักเรียน</div>
  </div>
</header>

<main class="container">

  <div class="card">
    <h3 class="card-title">📊 ภาพรวมวันนี้</h3>
    <div class="stat-grid">
      <div class="stat"><div class="label">นักเรียนทั้งหมด</div><div class="value" id="stat-total">-</div></div>
      <div class="stat"><div class="label">ชาย / หญิง</div><div class="value" id="stat-gender">- / -</div></div>
      <div class="stat"><div class="label">เงินฝากรวม</div><div class="value green" id="stat-bank">-</div></div>
      <div class="stat"><div class="label">คะแนนพฤติกรรมเฉลี่ย</div><div class="value pink" id="stat-behavior">-</div></div>
      <div class="stat"><div class="label">มาเรียนวันนี้</div><div class="value" id="stat-attend">-</div></div>
      <div class="stat"><div class="label">วันที่</div><div class="value" id="stat-date" style="font-size:18px">-</div></div>
    </div>
  </div>

  <div class="card">
    <h3 class="card-title">📚 เมนูระบบ</h3>
    <div class="menu-grid" id="menu-grid"></div>
  </div>

  <div class="text-center text-muted" style="font-size:13px;margin-top:28px">
    Baanmai SMS · v<span id="ver"></span> · <span id="api-status"></span>
  </div>
</main>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
document.getElementById('ver').textContent = window.APP_VERSION;
document.getElementById('stat-date').textContent = Utils.fmtDateThai(new Date());

// เมนู — ระบุ ready=false สำหรับโมดูลที่ยังไม่สร้าง (จะทยอยเปิดทีละ Module)
const MENUS = [
  { href: 'settings.html',   icon: 'gear-fill',          name: 'ตั้งค่าระบบ',     desc: 'ข้อมูลโรงเรียน · นำเข้า DMC · สำรองข้อมูล', ready: true },
  { href: 'students.html',   icon: 'people-fill',        name: 'ข้อมูลนักเรียน',  desc: 'ทะเบียน · ค้นหา · แก้ไข',  ready: false },
  { href: 'bank.html',       icon: 'piggy-bank-fill',    name: 'ธนาคารโรงเรียน',  desc: 'ฝาก / ถอน · PIN',          ready: true },
  { href: 'behavior.html',   icon: 'star-fill',          name: 'พฤติกรรม',        desc: 'เริ่มต้น 20 คะแนน',        ready: false },
  { href: 'health.html',     icon: 'heart-pulse-fill',   name: 'ตรวจสุขภาพ',      desc: 'ผม · เล็บ · ฟัน',          ready: false },
  { href: 'attendance.html', icon: 'calendar-check-fill',name: 'เช็คการมาเรียน',  desc: 'มา·ขาด·ลา·สาย · PIN',     ready: false },
];
document.getElementById('menu-grid').innerHTML = MENUS.map(function (m) {
  const badge = m.ready ? '' : '<div class="badge badge-fail" style="margin-top:4px">เร็วๆ นี้</div>';
  const tag = m.ready ? 'a' : 'div';
  const href = m.ready ? ' href="' + m.href + '"' : ' style="opacity:.6;cursor:not-allowed"';
  return '<' + tag + ' class="menu-tile"' + href + '><i class="bi bi-' + m.icon + ' icon"></i><div class="name">' + m.name + '</div><div class="desc">' + m.desc + '</div>' + badge + '</' + tag + '>';
}).join('');

async function loadDashboard() {
  try {
    const cfg = await api('settings.get', {}, { silent: true, loading: false });
    const s = cfg.settings || {};
    if (s.school_name) document.getElementById('school-name').textContent = s.school_name;
    if (s.current_year) document.getElementById('school-meta').textContent = 'ปีการศึกษา ' + s.current_year + ' ภาคเรียนที่ ' + (s.current_semester || '-');
    document.getElementById('api-status').textContent = '✅ เชื่อมต่อ Apps Script สำเร็จ';
  } catch (e) {
    document.getElementById('api-status').innerHTML = '<span style="color:#C62828">⚠️ ' + Utils.esc(e.message) + ' — แก้ js/config.js</span>';
    return;
  }
  try {
    const st = await api('students.stats', {}, { silent: true, loading: false });
    document.getElementById('stat-total').textContent = Utils.fmtInt(st.total);
    document.getElementById('stat-gender').textContent = st.male + ' / ' + st.female;
  } catch (e) { /* ยังไม่ได้ import */ }
}
loadDashboard();
</script>
</body>
</html>
