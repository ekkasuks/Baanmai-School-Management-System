name: Deploy to GitHub Pages

# Deploy โฟลเดอร์ frontend/ ขึ้น GitHub Pages อัตโนมัติทุกครั้งที่ push ขึ้น main
on:
  push:
    branches: [main]
  workflow_dispatch:        # กดรันเองได้จากแท็บ Actions

permissions:
  contents: read
  pages: write
  id-token: write

# ให้ deploy ทีละครั้ง ไม่ทับซ้อน
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload frontend/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
